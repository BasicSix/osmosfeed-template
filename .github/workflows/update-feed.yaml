name: 🚀 Live 站自动更新 (Vercel 触发器)

on:
  push:
    branches:
      - main
  schedule:
    # 每 3 小时准时踢 Vercel 一脚
    - cron: "0 */3 * * *"
  workflow_dispatch: # 保留手动按钮，方便你随时测试

jobs:
  ping-vercel:
    name: 发送部署信号到 Vercel
    runs-on: ubuntu-latest
    steps:
      - name: 📡 执行 Deploy Hook
        run: |
          # 增加一个简单的日志输出，确认 Secret 是否加载
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "❌ 错误: 未发现 VERCEL_DEPLOY_HOOK 密钥，请检查仓库配置！"
            exit 1
          fi
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "✅ 信号已发出，请前往 Vercel 控制台查看构建进度。"
