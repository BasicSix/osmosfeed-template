name: Trigger Vercel Update

on:
  push:
    branches:
      - main
  schedule:
    # 每 3 小时运行一次 (UTC 时间)
    - cron: "0 */3 * * *"
  workflow_dispatch: # 允许你手动点击按钮测试

jobs:
  ping-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Send Deploy Hook to Vercel
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
